syntax = "proto3";

package dirextalk.agent.v1;

option go_package = "github.com/YingSuiAI/dirextalk-agent/api/gen/dirextalk/agent/v1;agentv1";

import "google/protobuf/timestamp.proto";
import "dirextalk/agent/v1/cloud.proto";

enum ExecutionStatus {
  EXECUTION_STATUS_UNSPECIFIED = 0;
  EXECUTION_STATUS_DRAFT = 1;
  EXECUTION_STATUS_PLANNING = 2;
  EXECUTION_STATUS_AWAITING_APPROVAL = 3;
  EXECUTION_STATUS_QUEUED = 4;
  EXECUTION_STATUS_RUNNING = 5;
  EXECUTION_STATUS_WAITING_USER = 6;
  EXECUTION_STATUS_VERIFYING = 7;
  EXECUTION_STATUS_FINISHED = 8;
}

enum OutcomeStatus {
  OUTCOME_STATUS_UNSPECIFIED = 0;
  OUTCOME_STATUS_PENDING = 1;
  OUTCOME_STATUS_SUCCEEDED = 2;
  OUTCOME_STATUS_FAILED = 3;
  OUTCOME_STATUS_CANCELED = 4;
  OUTCOME_STATUS_TIMED_OUT = 5;
  OUTCOME_STATUS_INTERRUPTED = 6;
}

enum RetentionPolicy {
  RETENTION_POLICY_UNSPECIFIED = 0;
  RETENTION_POLICY_EPHEMERAL_AUTO_DESTROY = 1;
  RETENTION_POLICY_MANAGED_RETAINED = 2;
}

enum ExecutorKind {
  EXECUTOR_KIND_UNSPECIFIED = 0;
  EXECUTOR_KIND_CONTROL_PLANE = 1;
  EXECUTOR_KIND_CLOUD_WORKER = 2;
}

message Task {
  string task_id = 1;
  string owner_id = 2;
  string goal = 3;
  ExecutionStatus execution_status = 4;
  OutcomeStatus outcome_status = 5;
  RetentionPolicy retention_policy = 6;
  string current_step_id = 7;
  string approved_plan_id = 8;
  int64 revision = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message Step {
  string step_id = 1;
  string task_id = 2;
  string name = 3;
  repeated string depends_on_step_ids = 4;
  ExecutorKind executor_kind = 5;
  ExecutionStatus execution_status = 6;
  OutcomeStatus outcome_status = 7;
  int32 attempt = 8;
  int64 lease_epoch = 9;
  string checkpoint_ref = 10;
  string result_ref = 11;
  int64 revision = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
}

message Event {
  int64 seq = 1;
  string event_id = 2;
  string event_type = 3;
  string aggregate_type = 4;
  string aggregate_id = 5;
  int64 revision = 6;
  bytes summary_json = 7;
  google.protobuf.Timestamp occurred_at = 8;
}

message CreateTaskRequest {
  string idempotency_key = 1;
  string owner_id = 2;
  string goal = 3;
  RetentionPolicy retention_policy = 4;
}
message CreateTaskResponse { Task task = 1; }

message GetTaskRequest { string task_id = 1; }
message GetTaskResponse { Task task = 1; }

message ListTasksRequest {
  int32 page_size = 1;
  string page_token = 2;
  string owner_id = 3;
}

message ListTasksResponse {
  repeated Task tasks = 1;
  string next_page_token = 2;
}

message CancelTaskRequest {
  string idempotency_key = 1;
  string task_id = 2;
  int64 expected_revision = 3;
  string reason = 4;
}
message CancelTaskResponse { Task task = 1; }

message ListStepsRequest { string task_id = 1; }
message ListStepsResponse { repeated Step steps = 1; }
message WatchEventsRequest { int64 after_seq = 1; }
message WatchEventsResponse { Event event = 1; }

service TaskService {
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse);
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
  rpc CancelTask(CancelTaskRequest) returns (CancelTaskResponse);
  rpc ListSteps(ListStepsRequest) returns (ListStepsResponse);
  rpc WatchEvents(WatchEventsRequest) returns (stream WatchEventsResponse);
}

message RuntimeCapabilities {
  bool chat = 1;
  bool cloud_worker = 2;
  bool local_connector = 3;
  repeated string skills = 4;
  bool stream_chat = 5;
  bool runtime_config = 6;
  bool knowledge = 7;
  bool mcp_http = 8;
  repeated string model_profile_ids = 9;
}

message RuntimeServiceGetCapabilitiesRequest {}
message RuntimeServiceGetCapabilitiesResponse { RuntimeCapabilities capabilities = 1; }

enum ModelProvider {
  MODEL_PROVIDER_UNSPECIFIED = 0;
  MODEL_PROVIDER_OPENAI_COMPATIBLE = 1;
  MODEL_PROVIDER_DEEPSEEK = 2;
  MODEL_PROVIDER_ANTHROPIC = 3;
}

message ModelProfile {
  ModelProvider provider = 1;
  string model = 2;
  string base_url = 3;
  string secret_ref = 4;
  optional double temperature = 5;
  optional double top_p = 6;
  int32 max_output_tokens = 7;
  int32 context_window = 8;
  string reasoning_effort = 9;

  // Selects immutable server-owned provider, endpoint, model and credential
  // metadata. Callers may only override bounded sampling fields.
  string profile_id = 10;
}

message RuntimeConfigSpec {
  ModelProfile model_profile = 1;

  // Project-specific context is appended beneath the immutable server policy;
  // callers cannot replace the security policy or tool boundaries.
  string project_profile = 2;
  int32 context_message_limit = 3;
  int32 memory_message_limit = 4;
  int32 max_steps = 5;
  bool memory_disabled = 6;
  repeated string enabled_tools = 7;
  repeated string knowledge_refs = 8;
  repeated string mcp_server_ids = 9;
  repeated string recipe_ids = 10;
}

message RuntimeConfig {
  string owner_id = 1;
  RuntimeConfigSpec spec = 2;
  int64 revision = 3;
  google.protobuf.Timestamp updated_at = 4;
}

message GetRuntimeConfigRequest { string owner_id = 1; }
message GetRuntimeConfigResponse { RuntimeConfig config = 1; }

message PutRuntimeConfigRequest {
  string idempotency_key = 1;
  string owner_id = 2;
  RuntimeConfigSpec spec = 3;
  int64 expected_revision = 4;
}
message PutRuntimeConfigResponse { RuntimeConfig config = 1; }

message ChatRequest {
  string idempotency_key = 1;
  string owner_id = 2;
  string conversation_id = 3;
  string message = 4;
  bool memory_disabled = 5;
  int64 expected_conversation_revision = 6;
  CloudDialogueScopeV1 cloud_dialogue_scope = 7;
}

enum RuntimeStepKind {
  RUNTIME_STEP_KIND_UNSPECIFIED = 0;
  RUNTIME_STEP_KIND_MODEL = 1;
  RUNTIME_STEP_KIND_TOOL_CALL = 2;
  RUNTIME_STEP_KIND_TOOL_RESULT = 3;
}

message RuntimeStepSummary {
  RuntimeStepKind kind = 1;
  string tool_call_id = 2;
  string tool_name = 3;
  bool is_error = 4;
}

message RuntimeAssistantMessage {
  string message_id = 1;
  string content = 2;
}

message ChatResponse {
  string conversation_id = 1;
  RuntimeAssistantMessage message = 2;
  int64 conversation_revision = 3;
  repeated RuntimeStepSummary steps = 4;
  repeated string related_task_ids = 5;
  repeated string related_plan_ids = 6;
}

message StreamChatRequest {
  string idempotency_key = 1;
  string owner_id = 2;
  string conversation_id = 3;
  string message = 4;
  bool memory_disabled = 5;
  int64 expected_conversation_revision = 6;
  CloudDialogueScopeV1 cloud_dialogue_scope = 7;
}

message ChatDelta {
  string message_id = 1;
  string content = 2;
}

message ToolExecutionSummary {
  string tool_call_id = 1;
  string tool_name = 2;
  bool finished = 3;
  bool is_error = 4;
}

message ChatDone { ChatResponse response = 1; }

message StreamChatResponse {
  oneof event {
    ChatDelta delta = 1;
    ToolExecutionSummary tool = 2;
    ChatDone done = 3;
  }
}

service RuntimeService {
  rpc GetCapabilities(RuntimeServiceGetCapabilitiesRequest) returns (RuntimeServiceGetCapabilitiesResponse);
  rpc GetRuntimeConfig(GetRuntimeConfigRequest) returns (GetRuntimeConfigResponse);
  rpc PutRuntimeConfig(PutRuntimeConfigRequest) returns (PutRuntimeConfigResponse);
  rpc Chat(ChatRequest) returns (ChatResponse);
  rpc StreamChat(StreamChatRequest) returns (stream StreamChatResponse);
}

message CloudCapabilities {
  bool aws = 1;
  bool direct_sts = 2;
  bool worker = 3;
  bool reaper = 4;
}

message CloudControlServiceGetCapabilitiesRequest {}
message CloudControlServiceGetCapabilitiesResponse { CloudCapabilities capabilities = 1; }

enum CloudResourceType {
  CLOUD_RESOURCE_TYPE_UNSPECIFIED = 0;
  CLOUD_RESOURCE_TYPE_EC2 = 1;
  CLOUD_RESOURCE_TYPE_EBS = 2;
  CLOUD_RESOURCE_TYPE_ENI = 3;
  CLOUD_RESOURCE_TYPE_EIP = 4;
  CLOUD_RESOURCE_TYPE_SECURITY_GROUP = 5;
  CLOUD_RESOURCE_TYPE_ENDPOINT = 6;
  CLOUD_RESOURCE_TYPE_SNAPSHOT = 7;
}

enum CloudResourceStatus {
  CLOUD_RESOURCE_STATUS_UNSPECIFIED = 0;
  CLOUD_RESOURCE_STATUS_NONE = 1;
  CLOUD_RESOURCE_STATUS_PROVISIONING = 2;
  CLOUD_RESOURCE_STATUS_ACTIVE = 3;
  CLOUD_RESOURCE_STATUS_DESTROY_SCHEDULED = 4;
  CLOUD_RESOURCE_STATUS_RETAINED_MANAGED = 5;
  CLOUD_RESOURCE_STATUS_DESTROYING = 6;
  CLOUD_RESOURCE_STATUS_VERIFIED_DESTROYED = 7;
  CLOUD_RESOURCE_STATUS_DESTROY_BLOCKED = 8;
  CLOUD_RESOURCE_STATUS_ORPHANED = 9;
  CLOUD_RESOURCE_STATUS_MIXED = 10;
}

enum CloudWorkerStatus {
  CLOUD_WORKER_STATUS_UNSPECIFIED = 0;
  CLOUD_WORKER_STATUS_PENDING_ENROLLMENT = 1;
  CLOUD_WORKER_STATUS_READY = 2;
  CLOUD_WORKER_STATUS_LEASED = 3;
  CLOUD_WORKER_STATUS_CANCEL_REQUESTED = 4;
  CLOUD_WORKER_STATUS_FINISHED = 5;
}

message CloudResourceReadBack {
  bool observed = 1;
  bool exists = 2;
  string provider_id = 3;
  google.protobuf.Timestamp observed_at = 4;
  string tag_digest = 5;
}

message CloudResourceStateCount {
  CloudResourceStatus status = 1;
  uint32 count = 2;
}

message CloudReadBackSummary {
  uint32 total_resources = 1;
  uint32 observed_resources = 2;
  uint32 existing_resources = 3;
  uint32 missing_resources = 4;
  uint32 unobserved_resources = 5;
  google.protobuf.Timestamp last_observed_at = 6;
}

message CloudResourceSummary {
  CloudResourceStatus status = 1;
  repeated CloudResourceStateCount state_counts = 2;
  CloudReadBackSummary read_back = 3;
  int64 revision = 4;
}

message CloudDeployment {
  string deployment_id = 1;
  string owner_id = 2;
  string task_id = 3;
  string step_id = 4;
  string worker_id = 5;
  ExecutionStatus execution_status = 6;
  OutcomeStatus outcome_status = 7;
  CloudResourceSummary resources = 8;
  int64 revision = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  string plan_id = 12;
  string connection_id = 13;
}

message CloudResource {
  string resource_id = 1;
  string owner_id = 2;
  string task_id = 3;
  string deployment_id = 4;
  CloudResourceType type = 5;
  string logical_name = 6;
  string region = 7;
  string provider_id = 8;
  repeated string depends_on_resource_ids = 9;
  RetentionPolicy retention_policy = 10;
  google.protobuf.Timestamp destroy_deadline = 11;
  bool auto_destroy_approved = 12;
  CloudResourceStatus status = 13;
  CloudResourceReadBack read_back = 14;
  string blocked_reason = 15;
  int64 revision = 16;
  google.protobuf.Timestamp created_at = 17;
  google.protobuf.Timestamp updated_at = 18;
}

// CloudDestroyResourceScope is the exact provider/resource graph authorized
// by a manual destroy signature. The first release accepts only ephemeral
// EC2/EBS/ENI/security-group resources; all other resource types and Managed
// retention fail closed before a challenge is issued.
message CloudDestroyResourceScope {
  string resource_id = 1;
  CloudResourceType type = 2;
  string provider_id = 3;
  int64 revision = 4;
  repeated string depends_on_resource_ids = 5;
  RetentionPolicy retention_policy = 6;
  CloudResourceStatus status = 7;
  string region = 8;
  string spec_digest = 9;
  string approved_plan_hash = 10;
  string original_approval_id = 11;
  CloudResourceReadBack read_back = 12;
  google.protobuf.Timestamp destroy_deadline = 13;
  bool auto_destroy_approved = 14;
}

message CloudDeploymentDestroyScope {
  string schema_version = 1;
  string agent_instance_id = 2;
  string owner_id = 3;
  string deployment_id = 4;
  int64 deployment_revision = 5;
  string task_id = 6;
  string plan_id = 7;
  string plan_hash = 8;
  string connection_id = 9;
  repeated CloudDestroyResourceScope resources = 10;
}

message CloudDeploymentDestroyChallenge {
  string operation_id = 1;
  string challenge_id = 2;
  string approval_id = 3;
  string signer_key_id = 4;
  CloudDeploymentDestroyScope scope = 5;
  google.protobuf.Timestamp expires_at = 6;
  bytes signing_payload_cbor = 7;
  int64 revision = 8;
}

enum CloudDestroyOperationStatus {
  CLOUD_DESTROY_OPERATION_STATUS_UNSPECIFIED = 0;
  CLOUD_DESTROY_OPERATION_STATUS_AWAITING_APPROVAL = 1;
  CLOUD_DESTROY_OPERATION_STATUS_APPROVED = 2;
  CLOUD_DESTROY_OPERATION_STATUS_DESTROYING = 3;
  CLOUD_DESTROY_OPERATION_STATUS_VERIFIED_DESTROYED = 4;
  CLOUD_DESTROY_OPERATION_STATUS_DESTROY_BLOCKED = 5;
}

message CloudDestroyOperation {
  string operation_id = 1;
  string owner_id = 2;
  string deployment_id = 3;
  string approval_id = 4;
  string scope_digest = 5;
  CloudDestroyOperationStatus status = 6;
  string blocked_reason = 7;
  int64 revision = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
  string error_code = 11;
}

message CreateCloudDeploymentDestroyChallengeRequest {
  string idempotency_key = 1;
  string owner_id = 2;
  string deployment_id = 3;
  int64 expected_revision = 4;
  string signer_key_id = 5;
}
message CreateCloudDeploymentDestroyChallengeResponse {
  CloudDeploymentDestroyChallenge challenge = 1;
}

message ApproveCloudDeploymentDestroyRequest {
  string idempotency_key = 1;
  string owner_id = 2;
  string deployment_id = 3;
  int64 expected_revision = 4;
  DeviceApprovalSignature approval = 5;
}
message ApproveCloudDeploymentDestroyResponse {
  CloudDestroyOperation operation = 1;
  CloudDeployment deployment = 2;
}

message GetCloudDestroyOperationRequest {
  string owner_id = 1;
  string operation_id = 2;
}
message GetCloudDestroyOperationResponse {
  CloudDestroyOperation operation = 1;
}

message CloudWorker {
  string deployment_id = 1;
  string owner_id = 2;
  string worker_id = 3;
  CloudWorkerStatus status = 4;
  int32 attempt = 5;
  int64 lease_epoch = 6;
  google.protobuf.Timestamp lease_expires_at = 7;
  google.protobuf.Timestamp last_heartbeat_at = 8;
  bool cancellation_requested = 9;
  bool checkpoint_available = 10;
  bool result_available = 11;
  uint32 evidence_count = 12;
  int64 revision = 13;
  google.protobuf.Timestamp created_at = 14;
  google.protobuf.Timestamp updated_at = 15;
}

message GetCloudDeploymentRequest {
  string owner_id = 1;
  string deployment_id = 2;
}
message GetCloudDeploymentResponse { CloudDeployment deployment = 1; }
message ListCloudDeploymentsRequest {
  string owner_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}
message ListCloudDeploymentsResponse {
  repeated CloudDeployment deployments = 1;
  string next_page_token = 2;
}

message GetCloudResourceRequest {
  string owner_id = 1;
  string resource_id = 2;
}
message GetCloudResourceResponse { CloudResource resource = 1; }
message ListCloudResourcesRequest {
  string owner_id = 1;
  string deployment_id = 2;
  int32 page_size = 3;
  string page_token = 4;
}
message ListCloudResourcesResponse {
  repeated CloudResource resources = 1;
  string next_page_token = 2;
}

message GetCloudWorkerRequest {
  string owner_id = 1;
  string deployment_id = 2;
}
message GetCloudWorkerResponse { CloudWorker worker = 1; }
message ListCloudWorkersRequest {
  string owner_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}
message ListCloudWorkersResponse {
  repeated CloudWorker workers = 1;
  string next_page_token = 2;
}

service CloudControlService {
  rpc GetCapabilities(CloudControlServiceGetCapabilitiesRequest) returns (CloudControlServiceGetCapabilitiesResponse);
  rpc CreateCloudGoal(CreateCloudGoalRequest) returns (CreateCloudGoalResponse);
  rpc PreviewAwsIdentity(PreviewAwsIdentityRequest) returns (PreviewAwsIdentityResponse);
  rpc CreateCloudQuote(CreateCloudQuoteRequest) returns (CreateCloudQuoteResponse);
  rpc GetCloudQuote(GetCloudQuoteRequest) returns (GetCloudQuoteResponse);
  rpc CreateCloudPlan(CreateCloudPlanRequest) returns (CreateCloudPlanResponse);
  rpc GetCloudPlan(GetCloudPlanRequest) returns (GetCloudPlanResponse);
  rpc ListCloudPlans(ListCloudPlansRequest) returns (ListCloudPlansResponse);
  rpc CreateApprovalChallenge(CreateApprovalChallengeRequest) returns (CreateApprovalChallengeResponse);
  rpc ApproveCloudPlan(ApproveCloudPlanRequest) returns (ApproveCloudPlanResponse);
  rpc EstablishAwsConnection(EstablishAwsConnectionRequest) returns (EstablishAwsConnectionResponse);
  rpc GetCloudConnection(GetCloudConnectionRequest) returns (GetCloudConnectionResponse);
  rpc ListCloudConnections(ListCloudConnectionsRequest) returns (ListCloudConnectionsResponse);
  rpc GetCloudDeployment(GetCloudDeploymentRequest) returns (GetCloudDeploymentResponse);
  rpc ListCloudDeployments(ListCloudDeploymentsRequest) returns (ListCloudDeploymentsResponse);
  rpc GetCloudResource(GetCloudResourceRequest) returns (GetCloudResourceResponse);
  rpc ListCloudResources(ListCloudResourcesRequest) returns (ListCloudResourcesResponse);
  rpc GetCloudWorker(GetCloudWorkerRequest) returns (GetCloudWorkerResponse);
  rpc ListCloudWorkers(ListCloudWorkersRequest) returns (ListCloudWorkersResponse);
  rpc CreateCloudDeploymentDestroyChallenge(CreateCloudDeploymentDestroyChallengeRequest) returns (CreateCloudDeploymentDestroyChallengeResponse);
  rpc ApproveCloudDeploymentDestroy(ApproveCloudDeploymentDestroyRequest) returns (ApproveCloudDeploymentDestroyResponse);
  rpc GetCloudDestroyOperation(GetCloudDestroyOperationRequest) returns (GetCloudDestroyOperationResponse);
}

message CreateSessionRequest {
  string idempotency_key = 1;
  string owner_id = 2;
  string purpose = 3;
  string target_id = 4;
}

enum SecretBootstrapSessionStatus {
  SECRET_BOOTSTRAP_SESSION_STATUS_UNSPECIFIED = 0;
  SECRET_BOOTSTRAP_SESSION_STATUS_AWAITING_UPLOAD = 1;
  SECRET_BOOTSTRAP_SESSION_STATUS_UPLOADED = 2;
  SECRET_BOOTSTRAP_SESSION_STATUS_CONSUMED = 3;
  SECRET_BOOTSTRAP_SESSION_STATUS_EXPIRED = 4;
}

message SecretBootstrapSession {
  string session_id = 1;
  string owner_id = 2;
  string purpose = 3;
  string target_id = 4;
  bytes server_public_key = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp expires_at = 7;
  SecretBootstrapSessionStatus status = 8;
  int64 revision = 9;
  // The following immutable values are server-authoritative inputs to the
  // secret-bootstrap v1 AEAD associated data. Clients MUST use these values
  // instead of assuming a local Agent identity or schema version.
  string agent_instance_id = 10;
  string session_schema_version = 11;
  string envelope_schema_version = 12;
}

message CreateSessionResponse {
  string session_id = 1;
  bytes server_public_key = 2;
  bytes upload_token = 3;
  google.protobuf.Timestamp expires_at = 4;
  SecretBootstrapSession session = 5;
}

message SecretBootstrapServiceGetSessionRequest { string session_id = 1; }
message SecretBootstrapServiceGetSessionResponse { SecretBootstrapSession session = 1; }

message UploadEncryptedRequest {
  string session_id = 1;
  bytes upload_token = 2;
  bytes client_public_key = 3;
  bytes nonce = 4;
  bytes ciphertext = 5;
  string idempotency_key = 6;
  int64 expected_revision = 7;
}

message UploadEncryptedResponse {
  int64 revision = 1;
  SecretBootstrapSession session = 2;
}
// Reserved for a future device-approved secret destination protocol. After
// authenticating the caller, servers MUST return UNIMPLEMENTED until the signed
// request binds session revision, owner, purpose, target, destination, expiry,
// and approval-device identity.
message CompleteRequest {
  string session_id = 1;
  string idempotency_key = 2;
  int64 expected_revision = 3;
}
message CompleteResponse { string secret_ref = 1; }

service SecretBootstrapService {
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc GetSession(SecretBootstrapServiceGetSessionRequest) returns (SecretBootstrapServiceGetSessionResponse);
  rpc UploadEncrypted(UploadEncryptedRequest) returns (UploadEncryptedResponse);
  // Reserved; see CompleteRequest. This RPC performs no secret consumption or
  // delivery in v1.
  rpc Complete(CompleteRequest) returns (CompleteResponse);
}

message CreateServiceKeyRequest {
  string idempotency_key = 1;
  string client_id = 2;
  repeated string scopes = 3;
  google.protobuf.Timestamp expires_at = 4;
  string recipient_public_key = 5;
}

message ServiceKeyDelivery {
  string schema_version = 1;
  string server_public_key = 2;
  string nonce = 3;
  string ciphertext = 4;
  bytes associated_data = 5;
}

message CreateServiceKeyResponse {
  string credential_id = 1;
  string key_id = 2;
  string client_id = 3;
  repeated string scopes = 4;
  bool active = 5;
  int64 revision = 6;
  google.protobuf.Timestamp expires_at = 7;
  ServiceKeyDelivery delivery = 8;
}

message RevokeServiceKeyRequest {
  string idempotency_key = 1;
  string credential_id = 2;
  int64 expected_revision = 3;
}

message RevokeServiceKeyResponse {
  string credential_id = 1;
  string key_id = 2;
  string client_id = 3;
  repeated string scopes = 4;
  bool active = 5;
  int64 revision = 6;
  google.protobuf.Timestamp expires_at = 7;
}

enum ApprovalDeviceStatus {
  APPROVAL_DEVICE_STATUS_UNSPECIFIED = 0;
  APPROVAL_DEVICE_STATUS_ACTIVE = 1;
  APPROVAL_DEVICE_STATUS_REVOKED = 2;
}

message ApprovalDevice {
  string key_id = 1;
  string agent_instance_id = 2;
  string owner_id = 3;
  int64 revision = 4;
  ApprovalDeviceStatus status = 5;
  bytes public_key = 6;
  google.protobuf.Timestamp not_before = 7;
  google.protobuf.Timestamp expires_at = 8;
  google.protobuf.Timestamp revoked_at = 9;
}

message RegisterApprovalDeviceRequest {
  string idempotency_key = 1;
  int64 expected_revision = 2;
  string owner_id = 3;
  string key_id = 4;
  bytes public_key = 5;
  google.protobuf.Timestamp not_before = 6;
  google.protobuf.Timestamp expires_at = 7;
}

message RegisterApprovalDeviceResponse { ApprovalDevice device = 1; }

message RevokeApprovalDeviceRequest {
  string idempotency_key = 1;
  string key_id = 2;
  int64 expected_revision = 3;
}

message RevokeApprovalDeviceResponse { ApprovalDevice device = 1; }

service AdminService {
  rpc CreateServiceKey(CreateServiceKeyRequest) returns (CreateServiceKeyResponse);
  rpc RevokeServiceKey(RevokeServiceKeyRequest) returns (RevokeServiceKeyResponse);
  // Reserved for a future device-signed rotation protocol. Service Keys cannot
  // register or revoke approval devices. The first device is installed only by
  // the local one-time bootstrap command.
  rpc RegisterApprovalDevice(RegisterApprovalDeviceRequest) returns (RegisterApprovalDeviceResponse);
  // Reserved for a future device-signed rotation protocol; always fails closed
  // in v1.
  rpc RevokeApprovalDevice(RevokeApprovalDeviceRequest) returns (RevokeApprovalDeviceResponse);
}

message EnrollRequest {
  string deployment_id = 1;
  string worker_id = 2;
  string idempotency_key = 3;
  int64 expected_revision = 4;
}

message EnrollResponse {
  WorkerAssignment assignment = 1;
  bytes session_token = 2;
}

// CreateWorkerIdentityChallengeRequest starts production EC2 enrollment. It
// carries no AWS assertion; account, Region, owner, and expected instance are
// loaded from the approved deployment and provider read-back.
message CreateIdentityChallengeRequest {
  string deployment_id = 1;
  string worker_id = 2;
  string idempotency_key = 3;
  int64 expected_revision = 4;
}

message WorkerIdentityChallenge {
  string challenge_id = 1;
  string deployment_id = 2;
  string worker_id = 3;
  string region = 4;
  int64 expected_revision = 5;
  google.protobuf.Timestamp expires_at = 6;
  int64 revision = 7;
}

message CreateIdentityChallengeResponse {
  WorkerIdentityChallenge challenge = 1;
}

// WorkerIdentityProof carries a one-use SigV4 STS GetCallerIdentity request.
// authorization and session_token are bearer-equivalent and must be destroyed
// after verification; they are forbidden from logs, events, and persistence.
message WorkerIdentityProof {
  int32 schema_version = 1;
  string region = 2;
  string endpoint = 3;
  string method = 4;
  string host = 5;
  string content_type = 6;
  string content_sha256 = 7;
  string amz_date = 8;
  string challenge_id = 9;
  bytes body = 10;
  bytes authorization = 11;
  bytes session_token = 12;
}

message EnrollVerifiedIdentityRequest {
  string challenge_id = 1;
  string deployment_id = 2;
  string worker_id = 3;
  string idempotency_key = 4;
  int64 expected_revision = 5;
  WorkerIdentityProof proof = 6;
}

message EnrollVerifiedIdentityResponse {
  WorkerAssignment assignment = 1;
  bytes session_token = 2;
}

message WorkerAccessScope {
  string artifact_bucket = 1;
  string artifact_prefix = 2;
  string checkpoint_prefix = 3;
  string evidence_prefix = 4;
  string log_group = 5;
  string log_prefix = 6;
  repeated string secret_refs = 7;
}

message WorkerBundleReference {
  string s3_ref = 1;
  bytes sha256 = 2;
}

message WorkerAssignment {
  string deployment_id = 1;
  string owner_id = 2;
  string task_id = 3;
  string step_id = 4;
  string control_plane_endpoint = 5;
  string worker_id = 6;
  int32 attempt = 7;
  int64 lease_epoch = 8;
  google.protobuf.Timestamp lease_expires_at = 9;
  string checkpoint_ref = 10;
  WorkerAccessScope access = 11;
  bool cancellation_requested = 12;
  int64 revision = 13;
  WorkerBundleReference recipe_bundle = 14;
  WorkerBundleReference execution_bundle = 15;
  uint32 execution_timeout_seconds = 16;
  // These identify the lease that durably recorded checkpoint_ref. They may
  // differ from attempt/lease_epoch after a restarted Worker claims a new
  // fenced lease and are required to validate checkpoint contents.
  int32 checkpoint_attempt = 17;
  int64 checkpoint_lease_epoch = 18;
}

message WorkerControlServiceGetCurrentAssignmentRequest {
  string deployment_id = 1;
  string worker_id = 2;
}

message WorkerControlServiceGetCurrentAssignmentResponse { WorkerAssignment assignment = 1; }

message WorkerControlServiceClaimRequest {
  string deployment_id = 1;
  string worker_id = 2;
  string idempotency_key = 3;
  int64 expected_revision = 4;
  int32 lease_duration_seconds = 5;
}
message WorkerControlServiceClaimResponse { WorkerAssignment assignment = 1; }

message HeartbeatRequest {
  string deployment_id = 1;
  string worker_id = 2;
  int64 lease_epoch = 3;
  string idempotency_key = 4;
  int64 expected_revision = 5;
  int32 lease_duration_seconds = 6;
}

message HeartbeatResponse {
  int64 lease_epoch = 1;
  google.protobuf.Timestamp lease_expires_at = 2;
  bool cancellation_requested = 3;
  string checkpoint_ref = 4;
  int64 revision = 5;
}

enum WorkerEvidenceKind {
  WORKER_EVIDENCE_KIND_UNSPECIFIED = 0;
  WORKER_EVIDENCE_KIND_CHECKPOINT = 1;
  WORKER_EVIDENCE_KIND_ARTIFACT = 2;
  WORKER_EVIDENCE_KIND_LOG = 3;
  WORKER_EVIDENCE_KIND_CLAIM = 4;
}

// WorkerObjectClaim binds a scoped S3 reference to bytes already uploaded by
// the current lease. It contains no object body or credential material. The
// control plane persists it only as an untrusted Worker-local claim.
message WorkerObjectClaim {
  string ref = 1;
  bytes sha256 = 2;
  uint64 size_bytes = 3;
  string media_type = 4;
}

message WorkerControlServiceRecordEvidenceRequest {
  string deployment_id = 1;
  string worker_id = 2;
  int64 lease_epoch = 3;
  string idempotency_key = 4;
  int64 expected_revision = 5;
  WorkerEvidenceKind kind = 6;
  // Legacy non-object reference. New checkpoint/artifact/claim submissions
  // must use object and cannot rely on this field alone.
  string ref = 7;
  WorkerObjectClaim object = 8;
}
message WorkerControlServiceRecordEvidenceResponse { int64 revision = 1; }

enum WorkerOutcome {
  WORKER_OUTCOME_UNSPECIFIED = 0;
  WORKER_OUTCOME_SUCCEEDED = 1;
  WORKER_OUTCOME_FAILED = 2;
  WORKER_OUTCOME_CANCELED = 3;
  WORKER_OUTCOME_TIMED_OUT = 4;
  WORKER_OUTCOME_INTERRUPTED = 5;
}

message WorkerControlServiceCompleteRequest {
  string deployment_id = 1;
  string worker_id = 2;
  int64 lease_epoch = 3;
  string idempotency_key = 4;
  int64 expected_revision = 5;
  WorkerOutcome outcome = 6;
  // Legacy non-object result reference. A successful completion must bind the
  // exact uploaded result through result_object.
  string result_ref = 7;
  WorkerObjectClaim result_object = 8;
}
message WorkerControlServiceCompleteResponse { int64 revision = 1; }

service WorkerControlService {
  rpc CreateIdentityChallenge(CreateIdentityChallengeRequest) returns (CreateIdentityChallengeResponse);
  rpc EnrollVerifiedIdentity(EnrollVerifiedIdentityRequest) returns (EnrollVerifiedIdentityResponse);
  // Enroll is retained only for local/fake Workers that receive a one-time
  // token out of band. Production EC2 Workers use identity enrollment.
  rpc Enroll(EnrollRequest) returns (EnrollResponse);
  // Returns the current durable revision/lease/checkpoint under the Worker
  // session. A restarted process must call this before Claim; enrollment
  // replay responses are historical snapshots and cannot be used as CAS.
  rpc GetCurrentAssignment(WorkerControlServiceGetCurrentAssignmentRequest) returns (WorkerControlServiceGetCurrentAssignmentResponse);
  rpc Claim(WorkerControlServiceClaimRequest) returns (WorkerControlServiceClaimResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc RecordEvidence(WorkerControlServiceRecordEvidenceRequest) returns (WorkerControlServiceRecordEvidenceResponse);
  rpc Complete(WorkerControlServiceCompleteRequest) returns (WorkerControlServiceCompleteResponse);
}

// CreateCloudGoal starts durable planning only. It cannot approve a Plan,
// establish AWS control, create provider resources, or expose credentials.
message CreateCloudGoalRequest {
  string idempotency_key = 1;
  string owner_id = 2;
  string cloud_connection_id = 3;
  string goal = 4;
  RetentionPolicy retention_policy = 5;
  // Empty creates a private server-derived Recipe identity for this Goal.
  string recipe_id = 6;
}

enum CloudGoalPlanningState {
  CLOUD_GOAL_PLANNING_STATE_UNSPECIFIED = 0;
  CLOUD_GOAL_PLANNING_STATE_RESEARCH_QUEUED = 1;
  CLOUD_GOAL_PLANNING_STATE_PLAN_READY = 2;
}

message CloudGoalPlanning {
  string task_id = 1;
  string owner_id = 2;
  string cloud_connection_id = 3;
  string recipe_id = 4;
  CloudGoalPlanningState state = 5;
  // Empty until the planning pipeline persists and binds a CloudPlan.
  string related_plan_id = 6;
}

message CreateCloudGoalResponse {
  Task task = 1;
  CloudGoalPlanning planning = 2;
}

// CloudDialogueScopeV1 is trusted caller scope for a restricted cloud
// planning dialogue. It is resolved against persisted ownership by the Agent
// and is never derived from model output or model-callable tool arguments.
message CloudDialogueScopeV1 {
  string cloud_connection_id = 1;
}
