message CreateSessionRequest {
  string idempotency_key = 1;
  string owner_id = 2;
  string purpose = 3;
  string target_id = 4;
}

enum SecretBootstrapSessionStatus {
  SECRET_BOOTSTRAP_SESSION_STATUS_UNSPECIFIED = 0;
  SECRET_BOOTSTRAP_SESSION_STATUS_AWAITING_UPLOAD = 1;
  SECRET_BOOTSTRAP_SESSION_STATUS_UPLOADED = 2;
  SECRET_BOOTSTRAP_SESSION_STATUS_CONSUMED = 3;
  SECRET_BOOTSTRAP_SESSION_STATUS_EXPIRED = 4;
}

message SecretBootstrapSession {
  string session_id = 1;
  string owner_id = 2;
  string purpose = 3;
  string target_id = 4;
  bytes server_public_key = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp expires_at = 7;
  SecretBootstrapSessionStatus status = 8;
  int64 revision = 9;
  // The following immutable values are server-authoritative inputs to the
  // secret-bootstrap v1 AEAD associated data. Clients MUST use these values
  // instead of assuming a local Agent identity or schema version.
  string agent_instance_id = 10;
  string session_schema_version = 11;
  string envelope_schema_version = 12;
}

message CreateSessionResponse {
  string session_id = 1;
  bytes server_public_key = 2;
  bytes upload_token = 3;
  google.protobuf.Timestamp expires_at = 4;
  SecretBootstrapSession session = 5;
}

message SecretBootstrapServiceGetSessionRequest { string session_id = 1; }
message SecretBootstrapServiceGetSessionResponse { SecretBootstrapSession session = 1; }

message UploadEncryptedRequest {
  string session_id = 1;
  bytes upload_token = 2;
  bytes client_public_key = 3;
  bytes nonce = 4;
  bytes ciphertext = 5;
  string idempotency_key = 6;
  int64 expected_revision = 7;
}

message UploadEncryptedResponse {
  int64 revision = 1;
  SecretBootstrapSession session = 2;
}
// Reserved for a future device-approved secret destination protocol. After
// authenticating the caller, servers MUST return UNIMPLEMENTED until the signed
// request binds session revision, owner, purpose, target, destination, expiry,
// and approval-device identity.
message CompleteRequest {
  string session_id = 1;
  string idempotency_key = 2;
  int64 expected_revision = 3;
}
message CompleteResponse { string secret_ref = 1; }

service SecretBootstrapService {
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc GetSession(SecretBootstrapServiceGetSessionRequest) returns (SecretBootstrapServiceGetSessionResponse);
  rpc UploadEncrypted(UploadEncryptedRequest) returns (UploadEncryptedResponse);
  // Reserved; see CompleteRequest. This RPC performs no secret consumption or
  // delivery in v1.
  rpc Complete(CompleteRequest) returns (CompleteResponse);
}

