  rpc SubmitProof(SubmitProofRequest) returns (SubmitProofResponse);
  rpc ReconcileRevocation(ReconcileRevocationRequest) returns (ReconcileRevocationResponse);
  rpc ConfirmCanary(ConfirmCanaryRequest) returns (ConfirmCanaryResponse);
}
