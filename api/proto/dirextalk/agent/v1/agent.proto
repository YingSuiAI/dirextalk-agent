syntax = "proto3";

package dirextalk.agent.v1;

option go_package = "github.com/YingSuiAI/dirextalk-agent/api/gen/dirextalk/agent/v1;agentv1";

import "google/protobuf/timestamp.proto";
import "dirextalk/agent/v1/cloud.proto";

enum ExecutionStatus {
  EXECUTION_STATUS_UNSPECIFIED = 0;
  EXECUTION_STATUS_DRAFT = 1;
  EXECUTION_STATUS_PLANNING = 2;
  EXECUTION_STATUS_AWAITING_APPROVAL = 3;
  EXECUTION_STATUS_QUEUED = 4;
  EXECUTION_STATUS_RUNNING = 5;
  EXECUTION_STATUS_WAITING_USER = 6;
  EXECUTION_STATUS_VERIFYING = 7;
  EXECUTION_STATUS_FINISHED = 8;
}

enum OutcomeStatus {
  OUTCOME_STATUS_UNSPECIFIED = 0;
  OUTCOME_STATUS_PENDING = 1;
  OUTCOME_STATUS_SUCCEEDED = 2;
  OUTCOME_STATUS_FAILED = 3;
  OUTCOME_STATUS_CANCELED = 4;
  OUTCOME_STATUS_TIMED_OUT = 5;
  OUTCOME_STATUS_INTERRUPTED = 6;
}

enum RetentionPolicy {
  RETENTION_POLICY_UNSPECIFIED = 0;
  RETENTION_POLICY_EPHEMERAL_AUTO_DESTROY = 1;
  RETENTION_POLICY_MANAGED_RETAINED = 2;
}

enum ExecutorKind {
  EXECUTOR_KIND_UNSPECIFIED = 0;
  EXECUTOR_KIND_CONTROL_PLANE = 1;
  EXECUTOR_KIND_CLOUD_WORKER = 2;
}

message Task {
  string task_id = 1;
  string owner_id = 2;
  string goal = 3;
  ExecutionStatus execution_status = 4;
  OutcomeStatus outcome_status = 5;
  RetentionPolicy retention_policy = 6;
  string current_step_id = 7;
  string approved_plan_id = 8;
  int64 revision = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message Step {
  string step_id = 1;
  string task_id = 2;
  string name = 3;
  repeated string depends_on_step_ids = 4;
  ExecutorKind executor_kind = 5;
  ExecutionStatus execution_status = 6;
  OutcomeStatus outcome_status = 7;
  int32 attempt = 8;
  int64 lease_epoch = 9;
  string checkpoint_ref = 10;
  string result_ref = 11;
  int64 revision = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
}

message Event {
  int64 seq = 1;
  string event_id = 2;
  string event_type = 3;
  string aggregate_type = 4;
  string aggregate_id = 5;
  int64 revision = 6;
  bytes summary_json = 7;
  google.protobuf.Timestamp occurred_at = 8;
}

message CreateTaskRequest {
  string idempotency_key = 1;
  string owner_id = 2;
  string goal = 3;
  RetentionPolicy retention_policy = 4;
}
message CreateTaskResponse { Task task = 1; }

message GetTaskRequest { string task_id = 1; }
message GetTaskResponse { Task task = 1; }

message ListTasksRequest {
  int32 page_size = 1;
  string page_token = 2;
  string owner_id = 3;
}

message ListTasksResponse {
  repeated Task tasks = 1;
  string next_page_token = 2;
}

message CancelTaskRequest {
  string idempotency_key = 1;
  string task_id = 2;
  int64 expected_revision = 3;
  string reason = 4;
}
message CancelTaskResponse { Task task = 1; }

message ListStepsRequest { string task_id = 1; }
message ListStepsResponse { repeated Step steps = 1; }
message WatchEventsRequest { int64 after_seq = 1; }
message WatchEventsResponse { Event event = 1; }

service TaskService {
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse);
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
  rpc CancelTask(CancelTaskRequest) returns (CancelTaskResponse);
  rpc ListSteps(ListStepsRequest) returns (ListStepsResponse);
  rpc WatchEvents(WatchEventsRequest) returns (stream WatchEventsResponse);
}

message RuntimeCapabilities {
  bool chat = 1;
  bool cloud_worker = 2;
  bool local_connector = 3;
  repeated string skills = 4;
  bool stream_chat = 5;
  bool runtime_config = 6;
  bool knowledge = 7;
  bool mcp_http = 8;
  repeated string model_profile_ids = 9;
}

message RuntimeServiceGetCapabilitiesRequest {}
message RuntimeServiceGetCapabilitiesResponse { RuntimeCapabilities capabilities = 1; }

enum ModelProvider {
  MODEL_PROVIDER_UNSPECIFIED = 0;
  MODEL_PROVIDER_OPENAI_COMPATIBLE = 1;
  MODEL_PROVIDER_DEEPSEEK = 2;
  MODEL_PROVIDER_ANTHROPIC = 3;
}

message ModelProfile {
  ModelProvider provider = 1;
  string model = 2;
  string base_url = 3;
  string secret_ref = 4;
  optional double temperature = 5;
  optional double top_p = 6;
  int32 max_output_tokens = 7;
  int32 context_window = 8;
  string reasoning_effort = 9;

  // Selects immutable server-owned provider, endpoint, model and credential
  // metadata. Callers may only override bounded sampling fields.
  string profile_id = 10;
}

message RuntimeConfigSpec {
  ModelProfile model_profile = 1;

  // Project-specific context is appended beneath the immutable server policy;
  // callers cannot replace the security policy or tool boundaries.
  string project_profile = 2;
  int32 context_message_limit = 3;
  int32 memory_message_limit = 4;
  int32 max_steps = 5;
  bool memory_disabled = 6;
  repeated string enabled_tools = 7;
  repeated string knowledge_refs = 8;
  repeated string mcp_server_ids = 9;
  repeated string recipe_ids = 10;
}

message RuntimeConfig {
  string owner_id = 1;
  RuntimeConfigSpec spec = 2;
  int64 revision = 3;
  google.protobuf.Timestamp updated_at = 4;
}

message GetRuntimeConfigRequest { string owner_id = 1; }
message GetRuntimeConfigResponse { RuntimeConfig config = 1; }

message PutRuntimeConfigRequest {
  string idempotency_key = 1;
  string owner_id = 2;
  RuntimeConfigSpec spec = 3;
  int64 expected_revision = 4;
}
message PutRuntimeConfigResponse { RuntimeConfig config = 1; }

message ChatRequest {
  string idempotency_key = 1;
  string owner_id = 2;
  string conversation_id = 3;
  string message = 4;
  bool memory_disabled = 5;
  int64 expected_conversation_revision = 6;
  CloudDialogueScopeV1 cloud_dialogue_scope = 7;
}

enum RuntimeStepKind {
  RUNTIME_STEP_KIND_UNSPECIFIED = 0;
  RUNTIME_STEP_KIND_MODEL = 1;
  RUNTIME_STEP_KIND_TOOL_CALL = 2;
  RUNTIME_STEP_KIND_TOOL_RESULT = 3;
}

message RuntimeStepSummary {
  RuntimeStepKind kind = 1;
  string tool_call_id = 2;
  string tool_name = 3;
  bool is_error = 4;
}

message RuntimeAssistantMessage {
  string message_id = 1;
  string content = 2;
}

message ChatResponse {
  string conversation_id = 1;
  RuntimeAssistantMessage message = 2;
  int64 conversation_revision = 3;
  repeated RuntimeStepSummary steps = 4;
  repeated string related_task_ids = 5;
  repeated string related_plan_ids = 6;
}

message StreamChatRequest {
  string idempotency_key = 1;
  string owner_id = 2;
  string conversation_id = 3;
  string message = 4;
  bool memory_disabled = 5;
  int64 expected_conversation_revision = 6;
  CloudDialogueScopeV1 cloud_dialogue_scope = 7;
}

message ChatDelta {
  string message_id = 1;
  string content = 2;
}

message ToolExecutionSummary {
  string tool_call_id = 1;
  string tool_name = 2;
  bool finished = 3;
  bool is_error = 4;
}

message ChatDone { ChatResponse response = 1; }

message StreamChatResponse {
  oneof event {
    ChatDelta delta = 1;
    ToolExecutionSummary tool = 2;
    ChatDone done = 3;
  }
}

service RuntimeService {
  rpc GetCapabilities(RuntimeServiceGetCapabilitiesRequest) returns (RuntimeServiceGetCapabilitiesResponse);
  rpc GetRuntimeConfig(GetRuntimeConfigRequest) returns (GetRuntimeConfigResponse);
  rpc PutRuntimeConfig(PutRuntimeConfigRequest) returns (PutRuntimeConfigResponse);
  rpc Chat(ChatRequest) returns (ChatResponse);
  rpc StreamChat(StreamChatRequest) returns (stream StreamChatResponse);
}

message CloudCapabilities {
  bool aws = 1;
  bool direct_sts = 2;
  bool worker = 3;
  bool reaper = 4;
}

message CloudControlServiceGetCapabilitiesRequest {}
message CloudControlServiceGetCapabilitiesResponse { CloudCapabilities capabilities = 1; }

enum CloudResourceType {
  CLOUD_RESOURCE_TYPE_UNSPECIFIED = 0;
  CLOUD_RESOURCE_TYPE_EC2 = 1;
  CLOUD_RESOURCE_TYPE_EBS = 2;
  CLOUD_RESOURCE_TYPE_ENI = 3;
  CLOUD_RESOURCE_TYPE_EIP = 4;
  CLOUD_RESOURCE_TYPE_SECURITY_GROUP = 5;
  CLOUD_RESOURCE_TYPE_ENDPOINT = 6;
  CLOUD_RESOURCE_TYPE_SNAPSHOT = 7;
  CLOUD_RESOURCE_TYPE_ALB = 8;
  CLOUD_RESOURCE_TYPE_TARGET_GROUP = 9;
  CLOUD_RESOURCE_TYPE_LISTENER = 10;
  CLOUD_RESOURCE_TYPE_SECURITY_GROUP_RULE = 11;
}

enum CloudResourceStatus {
  CLOUD_RESOURCE_STATUS_UNSPECIFIED = 0;
  CLOUD_RESOURCE_STATUS_NONE = 1;
  CLOUD_RESOURCE_STATUS_PROVISIONING = 2;
  CLOUD_RESOURCE_STATUS_ACTIVE = 3;
  CLOUD_RESOURCE_STATUS_DESTROY_SCHEDULED = 4;
  CLOUD_RESOURCE_STATUS_RETAINED_MANAGED = 5;
  CLOUD_RESOURCE_STATUS_DESTROYING = 6;
  CLOUD_RESOURCE_STATUS_VERIFIED_DESTROYED = 7;
  CLOUD_RESOURCE_STATUS_DESTROY_BLOCKED = 8;
  CLOUD_RESOURCE_STATUS_ORPHANED = 9;
  CLOUD_RESOURCE_STATUS_MIXED = 10;
}

enum CloudWorkerStatus {
  CLOUD_WORKER_STATUS_UNSPECIFIED = 0;
  CLOUD_WORKER_STATUS_PENDING_ENROLLMENT = 1;
  CLOUD_WORKER_STATUS_READY = 2;
  CLOUD_WORKER_STATUS_LEASED = 3;
  CLOUD_WORKER_STATUS_CANCEL_REQUESTED = 4;
  CLOUD_WORKER_STATUS_FINISHED = 5;
}

message CloudResourceReadBack {
  bool observed = 1;
  bool exists = 2;
  string provider_id = 3;
  google.protobuf.Timestamp observed_at = 4;
  string tag_digest = 5;
}

message CloudResourceStateCount {
  CloudResourceStatus status = 1;
  uint32 count = 2;
}

message CloudReadBackSummary {
  uint32 total_resources = 1;
  uint32 observed_resources = 2;
  uint32 existing_resources = 3;
  uint32 missing_resources = 4;
  uint32 unobserved_resources = 5;
  google.protobuf.Timestamp last_observed_at = 6;
}

message CloudResourceSummary {
  CloudResourceStatus status = 1;
  repeated CloudResourceStateCount state_counts = 2;
  CloudReadBackSummary read_back = 3;
  int64 revision = 4;
}

enum CloudHealthStatus {
  CLOUD_HEALTH_STATUS_UNSPECIFIED = 0;
  CLOUD_HEALTH_STATUS_UNKNOWN = 1;
  CLOUD_HEALTH_STATUS_PENDING = 2;
  CLOUD_HEALTH_STATUS_HEALTHY = 3;
  CLOUD_HEALTH_STATUS_DEGRADED = 4;
  CLOUD_HEALTH_STATUS_UNHEALTHY = 5;
  CLOUD_HEALTH_STATUS_CANCELED = 6;
}

enum CloudHealthProbeKind {
  CLOUD_HEALTH_PROBE_KIND_UNSPECIFIED = 0;
  CLOUD_HEALTH_PROBE_KIND_LIVENESS = 1;
  CLOUD_HEALTH_PROBE_KIND_READINESS = 2;
  CLOUD_HEALTH_PROBE_KIND_SEMANTIC = 3;
}

enum CloudHealthEvidenceType {
  CLOUD_HEALTH_EVIDENCE_TYPE_UNSPECIFIED = 0;
  CLOUD_HEALTH_EVIDENCE_TYPE_NONE = 1;
  CLOUD_HEALTH_EVIDENCE_TYPE_INDEPENDENT_EXTERNAL = 2;
}

message CloudHealthProbeCount {
  CloudHealthProbeKind kind = 1;
  uint32 count = 2;
}

// CloudHealthSummary intentionally excludes probe URLs, request/response
// bytes, headers, pairing material, and secret references.
message CloudHealthSummary {
  CloudHealthStatus status = 1;
  int64 revision = 2;
  google.protobuf.Timestamp observed_at = 3;
  google.protobuf.Timestamp next_due_at = 4;
  uint32 probe_count = 5;
  repeated CloudHealthProbeCount probe_counts = 6;
  string external_evidence_digest = 7;
  CloudHealthEvidenceType evidence_type = 8;
}

message CloudDeployment {
  string deployment_id = 1;
  string owner_id = 2;
  string task_id = 3;
  string step_id = 4;
  string worker_id = 5;
  ExecutionStatus execution_status = 6;
  OutcomeStatus outcome_status = 7;
  CloudResourceSummary resources = 8;
  int64 revision = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  string plan_id = 12;
  string connection_id = 13;
  CloudHealthSummary health = 14;
}

message CloudResource {
  string resource_id = 1;
  string owner_id = 2;
  string task_id = 3;
  string deployment_id = 4;
  CloudResourceType type = 5;
  string logical_name = 6;
  string region = 7;
  string provider_id = 8;
  repeated string depends_on_resource_ids = 9;
  RetentionPolicy retention_policy = 10;
  google.protobuf.Timestamp destroy_deadline = 11;
  bool auto_destroy_approved = 12;
  CloudResourceStatus status = 13;
  CloudResourceReadBack read_back = 14;
  string blocked_reason = 15;
  int64 revision = 16;
  google.protobuf.Timestamp created_at = 17;
  google.protobuf.Timestamp updated_at = 18;
}

// CloudDestroyResourceScope is the exact provider/resource graph authorized
// by a manual destroy signature. The first release accepts only ephemeral
// EC2/EBS/ENI/security-group resources; all other resource types and Managed
// retention fail closed before a challenge is issued.
message CloudDestroyResourceScope {
  string resource_id = 1;
  CloudResourceType type = 2;
  string provider_id = 3;
  int64 revision = 4;
  repeated string depends_on_resource_ids = 5;
  RetentionPolicy retention_policy = 6;
  CloudResourceStatus status = 7;
  string region = 8;
  string spec_digest = 9;
  string approved_plan_hash = 10;
  string original_approval_id = 11;
  CloudResourceReadBack read_back = 12;
  google.protobuf.Timestamp destroy_deadline = 13;
  bool auto_destroy_approved = 14;
}

message CloudDeploymentDestroyScope {
  string schema_version = 1;
  string agent_instance_id = 2;
  string owner_id = 3;
  string deployment_id = 4;
  int64 deployment_revision = 5;
  string task_id = 6;
  string plan_id = 7;
  string plan_hash = 8;
  string connection_id = 9;
  repeated CloudDestroyResourceScope resources = 10;
}

message CloudDeploymentDestroyChallenge {
  string operation_id = 1;
  string challenge_id = 2;
  string approval_id = 3;
  string signer_key_id = 4;
  CloudDeploymentDestroyScope scope = 5;
  google.protobuf.Timestamp expires_at = 6;
  bytes signing_payload_cbor = 7;
  int64 revision = 8;
}

enum CloudDestroyOperationStatus {
  CLOUD_DESTROY_OPERATION_STATUS_UNSPECIFIED = 0;
  CLOUD_DESTROY_OPERATION_STATUS_AWAITING_APPROVAL = 1;
  CLOUD_DESTROY_OPERATION_STATUS_APPROVED = 2;
  CLOUD_DESTROY_OPERATION_STATUS_DESTROYING = 3;
  CLOUD_DESTROY_OPERATION_STATUS_VERIFIED_DESTROYED = 4;
  CLOUD_DESTROY_OPERATION_STATUS_DESTROY_BLOCKED = 5;
}

message CloudDestroyOperation {
  string operation_id = 1;
  string owner_id = 2;
  string deployment_id = 3;
  string approval_id = 4;
  string scope_digest = 5;
  CloudDestroyOperationStatus status = 6;
  string blocked_reason = 7;
  int64 revision = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
  string error_code = 11;
  int32 automatic_attempts = 12;
  google.protobuf.Timestamp next_attempt_at = 13;
  bool requires_new_approval = 14;
}

message CreateCloudDeploymentDestroyChallengeRequest {
  string idempotency_key = 1;
  string owner_id = 2;
  string deployment_id = 3;
  int64 expected_revision = 4;
  string signer_key_id = 5;
}
message CreateCloudDeploymentDestroyChallengeResponse {
  CloudDeploymentDestroyChallenge challenge = 1;
}

message ApproveCloudDeploymentDestroyRequest {
  string idempotency_key = 1;
  string owner_id = 2;
  string deployment_id = 3;
  int64 expected_revision = 4;
  DeviceApprovalSignature approval = 5;
}
message ApproveCloudDeploymentDestroyResponse {
  CloudDestroyOperation operation = 1;
  CloudDeployment deployment = 2;
}

message GetCloudDestroyOperationRequest {
  string owner_id = 1;
  string operation_id = 2;
}
message GetCloudDestroyOperationResponse {
  CloudDestroyOperation operation = 1;
}

// CloudEntryPlanStatus is deliberately separate from the initial Worker Plan.
// A public ALB entry always needs its own short-lived device approval after a
// successful Worker deployment.
enum CloudEntryPlanStatus {
  CLOUD_ENTRY_PLAN_STATUS_UNSPECIFIED = 0;
  CLOUD_ENTRY_PLAN_STATUS_DRAFT = 1;
  CLOUD_ENTRY_PLAN_STATUS_READY_FOR_APPROVAL = 2;
  CLOUD_ENTRY_PLAN_STATUS_APPROVED = 3;
  CLOUD_ENTRY_PLAN_STATUS_EXPIRED = 4;
  CLOUD_ENTRY_PLAN_STATUS_SUPERSEDED = 5;
}

enum CloudEntryOperationStatus {
  CLOUD_ENTRY_OPERATION_STATUS_UNSPECIFIED = 0;
  CLOUD_ENTRY_OPERATION_STATUS_AWAITING_APPROVAL = 1;
  CLOUD_ENTRY_OPERATION_STATUS_APPROVED = 2;
  CLOUD_ENTRY_OPERATION_STATUS_PROVISIONING = 3;
  CLOUD_ENTRY_OPERATION_STATUS_VERIFYING = 4;
  CLOUD_ENTRY_OPERATION_STATUS_ACTIVE = 5;
  CLOUD_ENTRY_OPERATION_STATUS_FAILED = 6;
  CLOUD_ENTRY_OPERATION_STATUS_DESTROYING = 7;
  CLOUD_ENTRY_OPERATION_STATUS_DESTROYED = 8;
  CLOUD_ENTRY_OPERATION_STATUS_DESTROY_BLOCKED = 9;
}

enum CloudEntryCertificateStatus {
  CLOUD_ENTRY_CERTIFICATE_STATUS_UNSPECIFIED = 0;
  CLOUD_ENTRY_CERTIFICATE_STATUS_ISSUED = 1;
  CLOUD_ENTRY_CERTIFICATE_STATUS_PENDING_VALIDATION = 2;
}

enum CloudEntryKind {
  CLOUD_ENTRY_KIND_UNSPECIFIED = 0;
  CLOUD_ENTRY_KIND_ALB = 1;
}

enum CloudEntryALBScheme {
  CLOUD_ENTRY_ALB_SCHEME_UNSPECIFIED = 0;
  CLOUD_ENTRY_ALB_SCHEME_INTERNET_FACING = 1;
}

enum CloudEntryListenerProtocol {
  CLOUD_ENTRY_LISTENER_PROTOCOL_UNSPECIFIED = 0;
  CLOUD_ENTRY_LISTENER_PROTOCOL_HTTPS = 1;
}

enum CloudEntryTargetProtocol {
  CLOUD_ENTRY_TARGET_PROTOCOL_UNSPECIFIED = 0;
  CLOUD_ENTRY_TARGET_PROTOCOL_HTTP = 1;
  CLOUD_ENTRY_TARGET_PROTOCOL_HTTPS = 2;
}

// The only acceptable source for a public ALB target is server-side AWS
// read-back of the approved Worker. This enum intentionally has no Worker
// URL, public IPv4, EIP, or VPC-endpoint alternative.
enum CloudEntryTargetSource {
  CLOUD_ENTRY_TARGET_SOURCE_UNSPECIFIED = 0;
  CLOUD_ENTRY_TARGET_SOURCE_APPROVED_WORKER_READ_BACK = 1;
}

enum CloudEntryEC2State {
  CLOUD_ENTRY_EC2_STATE_UNSPECIFIED = 0;
  CLOUD_ENTRY_EC2_STATE_RUNNING = 1;
}

enum CloudEntryErrorCode {
  CLOUD_ENTRY_ERROR_CODE_UNSPECIFIED = 0;
  CLOUD_ENTRY_ERROR_CODE_WORKER_NOT_READY = 1;
  CLOUD_ENTRY_ERROR_CODE_READ_BACK_MISMATCH = 2;
  CLOUD_ENTRY_ERROR_CODE_CERTIFICATE_NOT_READY = 3;
  CLOUD_ENTRY_ERROR_CODE_QUOTE_EXPIRED = 4;
  CLOUD_ENTRY_ERROR_CODE_APPROVAL_REQUIRED = 5;
  CLOUD_ENTRY_ERROR_CODE_PROVISION_FAILED = 6;
  CLOUD_ENTRY_ERROR_CODE_DESTROY_BLOCKED = 7;
  CLOUD_ENTRY_ERROR_CODE_VERIFICATION_FAILED = 8;
}

// CloudEntryCostScope is a device-visible price assumption. It is an
// estimate and alert input, not a hard billing limit.
message CloudEntryCostScope {
  string quote_id = 1;
  string quote_digest = 2;
  string currency = 3;
  google.protobuf.Timestamp quoted_at = 4;
  google.protobuf.Timestamp valid_until = 5;
  uint64 alb_hourly_estimate_micros = 6;
  uint64 lcu_hourly_estimate_micros = 7;
  uint32 estimated_lcu_milli_units = 8;
  uint64 estimated_egress_mib = 9;
  uint64 traffic_estimate_micros = 10;
  uint64 maximum_launch_amount_micros = 11;
  string assumptions_digest = 12;
}

// CloudEntryPlanDraft is the complete caller-provided public-entry intent.
// It deliberately has no Worker target, Worker URL, public IP, EIP,
// VPC-endpoint, security-group, credentials, headers, bodies, or secret
// field. The service derives all Worker/AWS facts from its durable ledger and
// independent read-back before returning a device-signable scope.
//
// Retention is not caller-provided: it is inherited exactly from the approved
// successful Worker so a public entry cannot outlive the service it exposes.
message CloudEntryPlanDraft {
  string hostname = 1;
  string certificate_arn = 2;
  repeated string public_subnet_ids = 3;
  uint32 target_port = 4;
  string health_path = 5;

  // First release uses exact HTTP 200 for both ALB target health and the
  // independent external probe. The service rejects any other value.
  uint32 expected_health_status_code = 6;
  string recipe_health_contract_digest = 7;
  string recipe_authentication_digest = 8;
  CloudEntryCostScope cost = 9;
}

message CloudEntryAWSReadBack {
  bool observed = 1;
  bool exists = 2;
  CloudEntryEC2State state = 3;
  google.protobuf.Timestamp observed_at = 4;
  string tag_digest = 5;
}

// CloudEntryWorkerReadBackScope is server-generated AWS evidence. It exposes
// the exact instance/resource identities being approved but never a Worker
// endpoint or an address.
message CloudEntryWorkerReadBackScope {
  string deployment_id = 1;
  int64 deployment_revision = 2;
  string task_id = 3;
  string original_plan_id = 4;
  string original_plan_hash = 5;
  string original_approval_id = 6;
  string worker_resource_id = 7;
  int64 worker_resource_revision = 8;
  string worker_spec_digest = 9;
  string instance_id = 10;
  string vpc_id = 11;
  string subnet_id = 12;
  string security_group_id = 13;
  OutcomeStatus execution_outcome = 14;
  google.protobuf.Timestamp succeeded_at = 15;
  CloudEntryAWSReadBack read_back = 16;
  RetentionPolicy retention_policy = 17;
  bool auto_destroy_approved = 18;
  google.protobuf.Timestamp destroy_deadline = 19;
}

// CloudEntryRecipeHealthBinding contains only Recipe contract digests. Recipe
// content, integrations, service credentials and user data are never part of
// this public API projection.
message CloudEntryRecipeHealthBinding {
  string recipe_digest = 1;
  string health_contract_digest = 2;
  string authentication_contract_digest = 3;
}

message CloudEntryCertificateScope {
  string certificate_arn = 1;
  string region = 2;
  string hostname = 3;
  repeated string subject_alternative_names = 4;
  CloudEntryCertificateStatus status = 5;
  string read_back_digest = 6;
  google.protobuf.Timestamp observed_at = 7;
}

message CloudEntryPublicSubnetScope {
  string subnet_id = 1;
  string vpc_id = 2;
  string availability_zone = 3;
  bool public = 4;
  string read_back_digest = 5;
  google.protobuf.Timestamp observed_at = 6;
}

message CloudEntryALBScope {
  CloudEntryALBScheme scheme = 1;
  uint32 listener_port = 2;
  CloudEntryListenerProtocol listener_protocol = 3;
  string tls_policy = 4;
  repeated string ingress_cidrs = 5;
  CloudEntryTargetProtocol target_protocol = 6;
  uint32 target_port = 7;
  CloudEntryTargetSource target_source = 8;
  repeated CloudEntryPublicSubnetScope public_subnets = 9;

  // These attest the fixed first-release boundary rather than carrying an
  // address. A public Worker address and elastic-IP attachment are prohibited.
  bool worker_private_only = 10;
  bool elastic_ip_prohibited = 11;
}

// CloudEntryHealthRouteScope is a path-only, credential-free health contract;
// it cannot carry a full URL, request headers, or a response body.
message CloudEntryHealthRouteScope {
  string path = 1;
  uint32 expected_status_code = 2;
  string evidence_digest = 3;
  bool no_credential_route = 4;
}

message CloudEntryAuthenticationScope {
  bool required = 1;
  string contract_digest = 2;
}

// CloudEntryRetentionScope is generated from the approved Worker retention
// policy. The caller sees it before signing but cannot change it through a
// public-entry request.
message CloudEntryRetentionScope {
  RetentionPolicy retention_policy = 1;
  bool auto_destroy_approved = 2;
  google.protobuf.Timestamp destroy_deadline = 3;
}

// CloudEntryApprovalScope is the complete server-generated, device-visible
// scope. It contains no URL, credentials, headers, bodies, secret references,
// Worker output, or user-supplied cloud target.
message CloudEntryApprovalScope {
  string schema_version = 1;
  CloudEntryKind kind = 2;
  string agent_instance_id = 3;
  string owner_id = 4;
  string connection_id = 5;
  string region = 6;
